[pytest]
# Запуск из каталога бэкенда (в контейнере: `cd /app/src && pytest ...`)
# pythonpath = src (относительно /app/src дает /app/src/src, где лежат app и knot_wrapper)
pythonpath = .
testpaths = tests
python_files = test.py tests.py test_*.py *_test.py
xfail_strict = true
filterwarnings = ignore::beartype.roar.BeartypeDecorHintPep585DeprecationWarning
