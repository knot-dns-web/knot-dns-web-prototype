services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    ports:
      - "53:53"
    volumes:
      - ./src/backend:/app/src
      - vscode-extensions:/run/.vscode-server/extensions
      - knot-sock:/run/knot
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - KNOT_SOCKET=/run/knot/knot.sock
    entrypoint: /app/entrypoint.sh
  frontend:
    build:
      context: src/frontend
    volumes:
      - ./src/frontend/src:/app/src
      - /app/src/node_modules
      - /app/src/.next
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    entrypoint: /app/entrypoint.sh
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80" # Все запросы идут сюда
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro # Путь к папке со сборкой React
    depends_on:
      - backend
      - frontend
volumes:
  vscode-extensions:
  knot-sock:
  